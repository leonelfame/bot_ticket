<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #06111f, #160617);
        color: #e8f1ff;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #f0529d;
        border-radius: 8px;
        background: #05080f;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .booking {
        margin: 18px 0;
        border: 1px solid rgba(84, 166, 255, 0.55);
        border-radius: 6px;
        background: #0b101b;
        padding: 14px;
        color: #4cff88;
        font-family: Consolas, "Courier New", monospace;
      }

      p {
        color: #9fb0c8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Payment Test</h1>
      <p>หน้านี้เป็นหน้าชำระเงินจำลองสำหรับทดสอบ UI เท่านั้น ไม่มีธุรกรรมจริง</p>
      <div class="booking" id="booking">TEST-MANUAL-0000</div>
      <p>ใช้สำหรับตรวจ flow หลัง task สร้าง booking id สำเร็จ</p>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      document.querySelector("#booking").textContent =
        params.get("booking") || "TEST-MANUAL-0000";
    </script>
  </body>
</html>
